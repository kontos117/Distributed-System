spring:
  application:
    name: manager-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mapreduce}
    username: ${DB_USER:mapreduce}
    password: ${DB_PASSWORD:mapreduce}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema; hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/mapreduce}
          jwk-set-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/mapreduce}/protocol/openid-connect/certs

  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB

server:
  port: 8081

minio:
  endpoint:        ${MINIO_ENDPOINT:http://minio:9000}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:${minio.endpoint}}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket:     ${MINIO_BUCKET:mapreduce}

k8s:
  namespace: ${K8S_NAMESPACE:mapreduce}
  worker:
    image: ${WORKER_IMAGE:mapreduce/worker:latest}
    backoff-limit: 3

app:
  manager:
    internal-url: ${MANAGER_INTERNAL_URL:http://manager-service:8081}

mapreduce:
  default-map-tasks: ${DEFAULT_MAP_TASKS:4}
  watchdog:
    interval-ms: 15000

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    console: >
      {"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}","service":"manager",
       "level":"%level","message":"%message","thread":"%thread"}%n
  level:
    gr.tuc.distributed: INFO
    org.springframework.security: WARN
