apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: manager-service
  namespace: mapreduce
spec:
  serviceName: manager-service
  replicas: 2
  selector:
    matchLabels:
      app: manager-service
  template:
    metadata:
      labels:
        app: manager-service
    spec:
      serviceAccountName: manager-sa
      containers:
        - name: manager
          image: mapreduce/manager-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: manager-config
            - secretRef:
                name: manager-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: manager-service
  namespace: mapreduce
spec:
  #ClusterIP — not exposed outside the cluster
  selector:
    app: manager-service
  ports:
    - port: 8081
      targetPort: 8081
