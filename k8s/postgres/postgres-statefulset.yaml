apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: mapreduce
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine 
          ports:
            - containerPort: 5432 #default ports
          envFrom:
            - secretRef:
                name: postgres-secret #very professional ik
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "mapreduce"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "mapreduce"]
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: mapreduce
spec:
  clusterIP: None   #headless satefuladdress themselves directly
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
